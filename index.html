<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PGA Betting Board</title>
<meta name="description" content="Free weekly PGA Tour value betting tips: tracked win/each-way/place picks with a transparent P&L, built from strokes-gained, recent form, course fit and the post-major let-down." />
<meta property="og:title" content="PGA Betting Board" />
<meta property="og:description" content="Value-led PGA Tour tips with a tracked P&L. Win, each-way & place picks every Monday." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#04142f; --bg2:#07203f; --panel:#0a2046; --panel2:#0d2a57; --line:#1d3e72;
    --txt:#eaf2fd; --muted:#8fa9d0; --blue:#2b8cff; --blue-d:#1657b0;
    --gold:#f2c14e; --gold-d:#b88a1f; --green:#36d399; --red:#ff6f6f; --shadow:0 10px 34px rgba(0,0,0,.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; background:radial-gradient(1200px 620px at 50% -12%,#0b3a7a 0%,var(--bg) 56%) fixed,var(--bg); color:var(--txt); line-height:1.5; -webkit-font-smoothing:antialiased; padding-bottom:60px; }
  .wrap { max-width:1120px; margin:0 auto; padding:0 18px; }
  .display { font-family:'Oswald',sans-serif; }

  header.top { border-bottom:1px solid var(--line); background:linear-gradient(180deg,rgba(43,140,255,.10),transparent); padding:24px 0 20px; }
  .brand { display:flex; align-items:center; gap:13px; }
  .brand .mark { width:48px; height:48px; border-radius:11px; flex:none; background:linear-gradient(135deg,var(--blue),var(--blue-d)); display:grid; place-items:center; font-family:'Oswald'; font-weight:700; font-size:19px; color:#fff; box-shadow:0 6px 18px rgba(43,140,255,.4); }
  .brand h1 { font-family:'Oswald'; font-weight:700; font-size:27px; letter-spacing:1px; text-transform:uppercase; line-height:1; }
  .brand .sub { color:var(--muted); font-size:12.5px; margin-top:3px; }
  .updated { margin-left:auto; text-align:right; font-size:12px; color:var(--muted); } .updated b { color:var(--blue); }

  .event { margin-top:20px; display:flex; flex-wrap:wrap; align-items:flex-end; gap:8px 22px; padding:20px 22px; border:1px solid var(--line); border-radius:16px; background:linear-gradient(120deg,var(--panel),var(--bg2)); }
  .event .ttl { font-family:'Oswald'; font-weight:700; font-size:30px; text-transform:uppercase; line-height:1.02; }
  .event .meta { color:var(--muted); font-size:14px; } .event .meta b { color:var(--txt); font-weight:600; }
  .event .pills { margin-left:auto; display:flex; gap:8px; flex-wrap:wrap; }
  .pill { font-size:12px; padding:6px 11px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.03); color:var(--muted); } .pill b { color:var(--txt); }

  .alert { margin-top:14px; padding:13px 16px; border-radius:12px; border:1px solid rgba(242,193,78,.35); background:rgba(242,193,78,.10); font-size:13.5px; color:#f6d99b; display:flex; gap:10px; align-items:flex-start; } .alert b { color:var(--gold); }

  .tabs { display:flex; gap:4px; margin:22px 0 6px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .tab { font-family:'Oswald'; font-weight:600; letter-spacing:.5px; text-transform:uppercase; font-size:13.5px; color:var(--muted); background:none; border:none; padding:11px 15px; cursor:pointer; border-bottom:2px solid transparent; }
  .tab:hover { color:var(--txt); } .tab.active { color:var(--blue); border-bottom-color:var(--blue); }
  .panel-tab { display:none; } .panel-tab.active { display:block; }

  .shead { display:flex; align-items:center; gap:14px; margin:28px 0 15px; }
  .shead h2 { font-family:'Oswald'; font-weight:700; font-size:20px; letter-spacing:1px; text-transform:uppercase; white-space:nowrap; }
  .shead .ln { height:1px; background:var(--line); flex:1; } .shead .tag { font-size:12px; color:var(--muted); white-space:nowrap; }
  .accent-blue h2 { color:var(--blue); } .accent-gold h2 { color:var(--gold); }
  .card-base { border:1px solid var(--line); border-radius:16px; background:linear-gradient(160deg,var(--panel),var(--bg2)); box-shadow:var(--shadow); }

  /* best bet hero */
  .bestbet { margin-top:22px; display:grid; grid-template-columns:auto 1fr auto; gap:22px; align-items:center; padding:20px 24px; position:relative; overflow:hidden; border-color:rgba(43,140,255,.4); }
  .bestbet::before { content:''; position:absolute; inset:0; background:linear-gradient(120deg,rgba(43,140,255,.14),transparent 60%); pointer-events:none; }
  .bestbet .tagline { position:absolute; top:14px; right:18px; font-family:'Oswald'; font-size:11px; letter-spacing:1.5px; color:var(--blue); text-transform:uppercase; }
  .bestbet .shot { width:92px; height:92px; border-radius:50%; object-fit:cover; border:3px solid var(--blue); background:#0c2750; }
  .bestbet .mkt { font-family:'Oswald'; font-size:12px; letter-spacing:1px; color:var(--gold); text-transform:uppercase; }
  .bestbet .nm { font-family:'Oswald'; font-weight:700; font-size:26px; text-transform:uppercase; line-height:1; margin:2px 0 6px; }
  .bestbet .why { color:#cfe0f7; font-size:14px; max-width:560px; }
  .bestbet .bigodds { text-align:right; } .bestbet .bigodds .o { font-family:'Oswald'; font-weight:700; font-size:44px; color:var(--blue); line-height:1; }
  .bestbet .bigodds .l { font-size:11px; color:var(--muted); } .edgechip { display:inline-block; margin-top:6px; padding:3px 9px; border-radius:6px; background:rgba(54,211,153,.16); color:var(--green); font-weight:700; font-size:12px; }

  .course { display:grid; grid-template-columns:1.3fr 1fr; gap:18px; }
  .course .info { padding:20px 22px; } .course .arche { font-family:'Oswald'; font-weight:600; text-transform:uppercase; letter-spacing:.8px; color:var(--blue); font-size:15px; }
  .course .summary { margin:9px 0 14px; color:#cfe0f7; font-size:14.5px; }
  .chips { display:flex; flex-wrap:wrap; gap:8px; } .chip { font-size:12.5px; padding:6px 11px; border-radius:8px; background:rgba(43,140,255,.12); border:1px solid rgba(43,140,255,.28); color:#bcd8ff; }
  .weights { padding:20px 22px; } .weights .wt-h { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:14px; }
  .wbar { margin-bottom:13px; } .wbar .lab { display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:5px; } .wbar .lab span:last-child { color:var(--blue); font-weight:600; }
  .track { height:8px; background:rgba(255,255,255,.07); border-radius:6px; overflow:hidden; } .track > i { display:block; height:100%; border-radius:6px; background:linear-gradient(90deg,var(--blue-d),var(--blue)); }

  .grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .grid2 { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
  .pick { position:relative; overflow:hidden; padding:0 0 18px; }
  .pick.flutter { border-color:rgba(242,193,78,.3); }
  .pick .ph { position:relative; padding:18px 18px 14px; display:flex; gap:14px; align-items:center; border-bottom:1px solid var(--line); background:linear-gradient(180deg,rgba(43,140,255,.08),transparent); }
  .pick.flutter .ph { background:linear-gradient(180deg,rgba(242,193,78,.10),transparent); }
  .badge { position:absolute; top:12px; right:12px; font-family:'Oswald'; font-size:11px; letter-spacing:1px; padding:4px 9px; border-radius:6px; text-transform:uppercase; font-weight:600; background:var(--blue); color:#04142f; }
  .pick.flutter .badge { background:var(--gold); color:#1c1402; }
  .shot { width:70px; height:70px; border-radius:50%; flex:none; object-fit:cover; background:#0c2750; border:2px solid var(--blue); }
  .pick.flutter .shot { border-color:var(--gold); }
  .shot.fallback,.tshot.fallback,.bshot.fallback { display:grid; place-items:center; font-family:'Oswald'; color:var(--muted); }
  .who .nm { font-family:'Oswald'; font-weight:600; font-size:18px; line-height:1.1; text-transform:uppercase; }
  .who .row2 { margin-top:6px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .flag { font-size:10.5px; font-weight:700; letter-spacing:.6px; padding:2px 7px; border-radius:5px; background:rgba(255,255,255,.08); color:var(--muted); }
  .owgr { font-size:11.5px; color:var(--muted); } .stars { color:var(--gold); font-size:12px; } .stars .off { color:#34507f; }

  .odds-row { display:flex; align-items:center; justify-content:space-between; padding:14px 18px 4px; }
  .odds-row .price { font-family:'Oswald'; font-weight:700; font-size:32px; line-height:1; } .odds-row .price small { font-family:'Inter'; font-weight:500; font-size:11px; color:var(--muted); display:block; }
  .edgebig { text-align:right; } .edgebig .e { font-family:'Oswald'; font-weight:700; font-size:24px; color:var(--green); } .edgebig .l { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; }
  .mvm { margin:8px 18px 0; } .mvm .r { display:flex; align-items:center; gap:8px; font-size:11px; margin-bottom:4px; } .mvm .r .lab { width:46px; color:var(--muted); } .mvm .r .v { width:34px; text-align:right; font-family:'Oswald'; font-weight:600; }
  .mvm .r.mk .track > i { background:linear-gradient(90deg,var(--gold-d),var(--gold)); }
  .stake { margin:11px 18px 0; padding:9px 12px; border-radius:10px; background:rgba(54,211,153,.08); border:1px solid rgba(54,211,153,.25); font-size:13px; } .stake .big { font-weight:700; } .stake .ew { color:var(--muted); font-size:11.5px; margin-top:2px; }
  .stake.flut { background:rgba(242,193,78,.08); border-color:rgba(242,193,78,.25); }
  .ldflag { margin:10px 18px 0; padding:7px 11px; border-radius:9px; background:rgba(242,193,78,.10); border:1px solid rgba(242,193,78,.3); font-size:11.5px; color:#f4d486; }
  .sg { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin:11px 18px 0; }
  .sg .cell { text-align:center; padding:7px 4px; border-radius:9px; background:rgba(255,255,255,.03); border:1px solid var(--line); } .sg .cell .k { font-size:9.5px; color:var(--muted); text-transform:uppercase; } .sg .cell .v { font-family:'Oswald'; font-weight:600; font-size:14px; margin-top:2px; }
  .pos { color:var(--blue); } .neg { color:var(--red); }
  .form { margin:10px 18px 0; font-size:12px; color:var(--muted); } .ar.up { color:var(--green); } .ar.down { color:var(--red); } .form .ar { font-weight:700; }
  .why2 { margin:10px 18px 0; font-size:12.5px; color:#cfe0f7; }

  /* P&L */
  .pnlgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:8px; }
  .pnlgrid .b { padding:16px 18px; } .pnlgrid .b .k { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; } .pnlgrid .b .v { font-family:'Oswald'; font-weight:700; font-size:26px; margin-top:5px; } .pnlgrid .b small { color:var(--muted); font-size:11.5px; }
  .stat-up { color:var(--green); } .stat-dn { color:var(--red); }
  .emptybox { padding:18px; text-align:center; color:var(--muted); font-size:13.5px; }

  /* ew value + selections */
  .grid4 { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .ewcard { padding:16px; text-align:center; border-color:rgba(242,193,78,.3); }
  .ewcard .bshot { width:58px; height:58px; border-radius:50%; object-fit:cover; border:2px solid var(--gold); background:#0c2750; margin:0 auto 9px; }
  .ewcard .nm { font-family:'Oswald'; font-weight:600; font-size:15px; text-transform:uppercase; }
  .ewcard .o { margin-top:7px; font-family:'Oswald'; font-weight:700; font-size:19px; color:var(--gold); }
  .ewcard .o small { display:block; color:var(--muted); font-size:11px; font-family:'Inter'; font-weight:400; }
  .ewcard .ed { margin-top:6px; font-size:11.5px; color:var(--green); font-weight:600; }
  .sel3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .selcol h3 { font-family:'Oswald'; font-weight:600; text-transform:uppercase; letter-spacing:.6px; font-size:14px; color:var(--blue); padding:13px 14px 8px; }
  .selrow { display:flex; align-items:center; gap:9px; padding:8px 14px; border-top:1px solid rgba(29,62,114,.5); font-size:13px; }
  .selrow .tshot { width:26px; height:26px; border-radius:50%; object-fit:cover; background:#0c2750; }
  .selrow .nm { flex:1; } .selrow .od { font-family:'Oswald'; font-weight:600; width:42px; text-align:right; } .selrow .ed { width:46px; text-align:right; color:var(--green); font-size:11.5px; font-weight:600; }

  table { width:100%; border-collapse:collapse; margin-top:6px; font-size:13.5px; }
  thead th { text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); padding:9px 10px; border-bottom:1px solid var(--line); }
  tbody td { padding:9px 10px; border-bottom:1px solid rgba(29,62,114,.5); } tbody tr:hover { background:rgba(43,140,255,.06); }
  .tname { display:flex; align-items:center; gap:10px; } .tshot { width:30px; height:30px; border-radius:50%; object-fit:cover; background:#0c2750; }
  .rk { color:var(--muted); width:30px; } td.num { font-family:'Oswald'; font-weight:600; } .right { text-align:right; }
  .wbadge { font-size:10px; color:var(--green); border:1px solid rgba(54,211,153,.4); border-radius:5px; padding:1px 6px; margin-left:6px; }

  .notes { margin-top:24px; font-size:12.5px; color:var(--muted); } .notes li { margin:5px 0 5px 18px; }
  footer { margin-top:24px; padding-top:18px; border-top:1px solid var(--line); font-size:12px; color:var(--muted); display:flex; flex-wrap:wrap; gap:10px; justify-content:space-between; } .rg { color:#d7a93a; }

  @media (max-width:880px) { .course,.grid3,.sel3,.grid2 { grid-template-columns:1fr; } .grid4,.pnlgrid { grid-template-columns:repeat(2,1fr); } .bestbet { grid-template-columns:1fr; text-align:center; } .bestbet .shot,.bestbet .bigodds { margin:0 auto; text-align:center; } .event .pills { margin-left:0; } }
</style>
</head>
<body>
<header class="top"><div class="wrap" style="display:flex;align-items:center;gap:14px;">
  <div class="brand"><div class="mark">PGA</div><div><h1>Betting Board</h1><div class="sub">Value tips with a tracked P&amp;L &middot; every Monday</div></div></div>
  <div class="updated" id="updated"></div>
</div></header>
<main class="wrap" id="app"></main>

<script src="data.js"></script>
<script>
const B = window.BOARD;
const $ = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild;};
const gbp = (n)=>'£'+(Number.isInteger(n)?n:n.toFixed(2));
const signed = (n)=>(n>=0?'+£':'-£')+Math.abs(n).toFixed(2);
const initials = (nm)=>nm.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const sgFmt = (v)=>(v==null||isNaN(v))?'–':(v>=0?'+':'')+v.toFixed(2);
const sgCls = (v)=>v>=0?'pos':'neg';
const stars = (n)=>Array.from({length:5},(_,i)=>i<n?'★':'<span class="off">★</span>').join('');
const arrow = (t)=>t==='up'?'▲ trending up':t==='down'?'▼ cooling off':'▬ steady';
const pct = (p)=>(p*100).toFixed(p<0.1?1:0)+'%';
const shot=(p,cls,size)=>`<img class="${cls}" src="${p.headshot}" alt="${p.name}" loading="lazy" onerror="this.outerHTML='<div class=\\'${cls} fallback\\' style=\\'font-size:${size}px\\'>${initials(p.name)}</div>'">`;

function valueCard(c) {
  const flut = !c.tracked;
  const stakeBox = flut
    ? `<div class="stake flut"><div class="big">${c.kind} &middot; suggested ${gbp(c.suggestGBP)} ${c.eachWay?'each-way':''}</div><div class="ew">Just for fun - not tracked in the P&L</div></div>`
    : `<div class="stake"><div class="big">Stake: ${c.points} pt${c.points>1?'s':''} &middot; ${gbp(c.stakeGBP)}${c.eachWay?' each-way':' ('+c.marketLabel+')'}</div><div class="ew">${c.eachWay?gbp(c.ewWin)+' win / '+gbp(c.ewPlace)+' place &middot; ':''}tracked in P&L</div></div>`;
  return $(`
  <div class="card-base pick ${flut?'flutter':''}">
    <div class="ph">
      <span class="badge">${c.marketLabel}</span>
      ${shot(c,'shot',22)}
      <div class="who"><div class="nm">${c.name}</div>
        <div class="row2"><span class="flag">${c.country||''}</span><span class="owgr">OWGR #${c.owgr}</span><span class="stars">${stars(c.confidence)}</span></div>
      </div>
    </div>
    <div class="odds-row">
      <div class="price">${c.marketOdds.fractional}<small>market price${c.eachWay?' (e/w)':''}</small></div>
      <div class="edgebig"><div class="e">+${c.edgePct}%</div><div class="l">value edge</div></div>
    </div>
    <div class="mvm">
      <div class="r"><span class="lab">Model</span><div class="track"><i style="width:${Math.min(100,c.modelProb*100)}%"></i></div><span class="v">${pct(c.modelProb)}</span></div>
      <div class="r mk"><span class="lab">Market</span><div class="track"><i style="width:${Math.min(100,c.marketProb*100)}%"></i></div><span class="v">${pct(c.marketProb)}</span></div>
    </div>
    ${c.letdownFlag?`<div class="ldflag">⚠ ${c.letdownFlag}</div>`:''}
    ${stakeBox}
    <div class="sg">
      <div class="cell"><div class="k">Off Tee</div><div class="v ${sgCls(c.sg.ott)}">${sgFmt(c.sg.ott)}</div></div>
      <div class="cell"><div class="k">Approach</div><div class="v ${sgCls(c.sg.app)}">${sgFmt(c.sg.app)}</div></div>
      <div class="cell"><div class="k">Short</div><div class="v ${sgCls(c.sg.arg)}">${sgFmt(c.sg.arg)}</div></div>
      <div class="cell"><div class="k">Putting</div><div class="v ${sgCls(c.sg.putt)}">${sgFmt(c.sg.putt)}</div></div>
    </div>
    <div class="form"><span class="ar ${c.trend}">${arrow(c.trend)}</span> ${c.recentEvents?`&middot; ${c.recentSG.toFixed(2)} SG/rd, last ${c.recentEvents} starts`:''}</div>
    <div class="why2">${c.rationale}</div>
  </div>`);
}
const selCol=(title,list,mkt)=>`<div class="card-base selcol"><h3>${title}</h3>${list.map(c=>`<div class="selrow">${shot(c,'tshot',11)}<span class="nm">${c.name}</span><span class="od">${c.modelOdds.fractional}</span><span class="ed">+${c.edgePct}%</span></div>`).join('')}</div>`;

function render() {
  document.getElementById('updated').innerHTML = `Updated<br><b>${new Date(B.generatedAt).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</b>`;
  const app = document.getElementById('app');
  const cp = B.courseProfile, wlabels={ott:'Off the tee',app:'Approach play',arg:'Short game',putt:'Putting'};

  app.appendChild($(`<div class="event"><div><div class="ttl">${B.event.name}</div><div class="meta"><b>${B.event.course||''}</b> ${B.event.city?'&middot; '+B.event.city+', '+(B.event.state||''):''}</div></div>
    <div class="pills">${B.event.dateRange?`<span class="pill"><b>${B.event.dateRange}</b></span>`:''}<span class="pill">Field <b>${B.event.fieldSize}</b></span>${cp.par?`<span class="pill">Par <b>${cp.par}</b></span>`:''}${cp.yards?`<span class="pill"><b>${cp.yards.toLocaleString()}</b> yds</span>`:''}</div></div>`));
  if (B.previousEvent && B.previousEvent.isMajor)
    app.appendChild($(`<div class="alert"><span>⚠</span><div><b>Post-major week.</b> Last week was the ${B.previousEvent.name} (a major). Contenders - especially winner ${B.previousEvent.champion} - rarely fire again the next week, so the model fades them (you'll see them on the Watchlist, not in the bets).</div></div>`));

  app.appendChild($(`<div class="tabs">
    <button class="tab active" data-tab="card">The Card</button>
    <button class="tab" data-tab="places">Each-Way &amp; Places</button>
    <button class="tab" data-tab="watch">Watchlist</button>
    <button class="tab" data-tab="pnl">P&amp;L</button>
    <button class="tab" data-tab="rankings">World Rankings</button>
  </div>`));

  // ----- TAB: THE CARD -----
  const t1 = $(`<div class="panel-tab active" id="tab-card"></div>`);
  const bb = B.bestBet;
  if (bb) t1.appendChild($(`<div class="card-base bestbet"><span class="tagline">★ Best Bet of the Week</span>${shot(bb,'shot',26)}
    <div><div class="mkt">${bb.marketLabel} &middot; best value on the board</div><div class="nm">${bb.name}</div><div class="why">${bb.rationale}</div></div>
    <div class="bigodds"><div class="o">${bb.marketOdds.fractional}</div><div class="l">market price</div><div class="edgechip">+${bb.edgePct}% edge</div></div></div>`));

  t1.appendChild($(`<div class="shead accent-blue"><h2>Tracked Bets</h2><div class="ln"></div><div class="tag">value-ranked &middot; these feed the P&L</div></div>`));
  const g1=$(`<div class="grid3"></div>`); B.trackedBets.forEach(c=>g1.appendChild(valueCard(c))); t1.appendChild(g1);

  if (B.flutters && B.flutters.length) {
    t1.appendChild($(`<div class="shead accent-gold"><h2>Untracked Flutters</h2><div class="ln"></div><div class="tag">if you fancy it &middot; not in the P&L</div></div>`));
    const g2=$(`<div class="grid2"></div>`); B.flutters.forEach(c=>g2.appendChild(valueCard(c))); t1.appendChild(g2);
  }

  t1.appendChild($(`<div class="shead accent-blue"><h2>The Course</h2><div class="ln"></div><div class="tag">course-fit drives the value</div></div>`));
  const maxW=Math.max(...Object.values(cp.weights));
  const bars=['app','ott','arg','putt'].sort((a,b)=>cp.weights[b]-cp.weights[a]).map(k=>`<div class="wbar"><div class="lab"><span>${wlabels[k]}</span><span>${Math.round(cp.weights[k]*100)}%</span></div><div class="track"><i style="width:${(cp.weights[k]/maxW*100).toFixed(0)}%"></i></div></div>`).join('');
  t1.appendChild($(`<div class="course"><div class="card-base info"><div class="arche">${cp.archetype}</div><div class="summary">${cp.summary}</div><div class="chips">${cp.tags.map(t=>`<span class="chip">${t}</span>`).join('')}</div></div><div class="card-base weights"><div class="wt-h">Skill weighting the model uses</div>${bars}</div></div>`));

  t1.appendChild($(`<div class="shead accent-blue"><h2>Field Watch</h2><div class="ln"></div><div class="tag">model top 15 by win chance</div></div>`));
  const fr=B.fieldRanking.map(p=>`<tr><td class="rk">${p.modelRank}</td><td><div class="tname">${shot(p,'tshot',11)}<span>${p.name}</span></div></td><td class="num right">${p.win.fractional}</td><td class="num right">${pct(p.winProb)}</td><td class="right ${p.trend==='up'?'pos':p.trend==='down'?'neg':''}">${p.trend==='up'?'▲':p.trend==='down'?'▼':'▬'} ${p.recentEvents?p.recentSG.toFixed(2):'–'}</td></tr>`).join('');
  t1.appendChild($(`<div class="card-base" style="padding:6px 14px 10px;overflow-x:auto"><table><thead><tr><th></th><th>Player</th><th class="right">Win odds</th><th class="right">Win%</th><th class="right">Recent SG</th></tr></thead><tbody>${fr}</tbody></table></div>`));
  app.appendChild(t1);

  // ----- TAB: PLACES -----
  const t2=$(`<div class="panel-tab" id="tab-places"></div>`);
  t2.appendChild($(`<div class="shead accent-gold"><h2>Best Each-Way Value</h2><div class="ln"></div><div class="tag">strong top-5 chance at a price</div></div>`));
  const g4=$(`<div class="grid4"></div>`);
  (B.eachWayValue||[]).forEach(c=>g4.appendChild($(`<div class="card-base ewcard">${shot(c,'bshot',16)}<div class="nm">${c.name}</div><div class="o">${c.marketOdds.fractional}<small>Top 5 &middot; ${pct(c.modelProb)} chance</small></div><div class="ed">+${c.edgePct}% edge</div></div>`)));
  t2.appendChild(g4);
  t2.appendChild($(`<div class="shead accent-blue"><h2>Place Selections</h2><div class="ln"></div><div class="tag">ranked by value (model vs market)</div></div>`));
  t2.appendChild($(`<div class="sel3">${selCol('To Finish Top 5',B.top5Sel,'top5')}${selCol('To Finish Top 10',B.top10Sel,'top10')}${selCol('To Finish Top 20',B.top20Sel,'top20')}</div>`));
  t2.appendChild($(`<div class="shead accent-blue"><h2>Full Market Board</h2><div class="ln"></div><div class="tag">model fair odds, all markets</div></div>`));
  const prt=B.placesTable.map(p=>`<tr><td class="rk">${p.modelRank}</td><td><div class="tname">${shot(p,'tshot',11)}<span>${p.name}${p.letdownFlag?' <span style="color:var(--gold)">⚠</span>':''}</span></div></td><td class="num right">${p.win.fractional}</td><td class="num right">${p.top5.fractional}</td><td class="num right">${p.top10.fractional}</td><td class="num right">${p.top20.fractional}</td></tr>`).join('');
  t2.appendChild($(`<div class="card-base" style="padding:6px 14px 10px;overflow-x:auto"><table><thead><tr><th></th><th>Player</th><th class="right">Win</th><th class="right">Top 5</th><th class="right">Top 10</th><th class="right">Top 20</th></tr></thead><tbody>${prt}</tbody></table></div>`));
  app.appendChild(t2);

  // ----- TAB: WATCHLIST -----
  const t3=$(`<div class="panel-tab" id="tab-watch"></div>`);
  t3.appendChild($(`<div class="shead accent-blue"><h2>Watchlist</h2><div class="ln"></div><div class="tag">not backable this week &middot; ones to watch</div></div>`));
  const wl=(B.watchlist||[]).map(w=>`<tr><td><div class="tname">${shot(w,'tshot',11)}<span>${w.name}</span></div></td><td class="right">#${w.owgr}</td><td class="right ${w.trend==='up'?'pos':w.trend==='down'?'neg':''}">${w.trend==='up'?'▲':w.trend==='down'?'▼':'▬'} ${w.recentEvents?w.recentSG.toFixed(2):'–'}</td><td class="num right">${w.winOdds}</td><td style="color:#cfe0f7">${w.why}</td></tr>`).join('');
  t3.appendChild($(`<div class="card-base" style="padding:6px 14px 10px;overflow-x:auto"><table><thead><tr><th>Player</th><th class="right">OWGR</th><th class="right">Recent SG</th><th class="right">Win</th><th>Why watch</th></tr></thead><tbody>${wl}</tbody></table></div>`));
  app.appendChild(t3);

  // ----- TAB: P&L -----
  const t4=$(`<div class="panel-tab" id="tab-pnl"></div>`);
  const pl=B.pnl;
  const pcls=pl.profitGBP>0?'stat-up':pl.profitGBP<0?'stat-dn':'';
  t4.appendChild($(`<div class="shead accent-blue"><h2>Profit &amp; Loss</h2><div class="ln"></div><div class="tag">tracked bets only &middot; settled off final results</div></div>`));
  t4.appendChild($(`<div class="pnlgrid">
    <div class="card-base b"><div class="k">Bankroll</div><div class="v">${gbp(pl.bankrollNowGBP)}</div><small>from ${gbp(pl.bankrollStartGBP)} start</small></div>
    <div class="card-base b"><div class="k">Profit / Loss</div><div class="v ${pcls}">${signed(pl.profitGBP)}</div><small>${pl.settledCount} bets settled</small></div>
    <div class="card-base b"><div class="k">ROI</div><div class="v ${pcls}">${pl.roiPct>=0?'+':''}${pl.roiPct}%</div><small>return on stakes</small></div>
    <div class="card-base b"><div class="k">Strike rate</div><div class="v">${pl.strikeRatePct}%</div><small>${pl.won}W &middot; ${pl.lost}L</small></div>
  </div>`));

  t4.appendChild($(`<div class="shead accent-blue"><h2>Open Bets</h2><div class="ln"></div><div class="tag">this week &middot; ${pl.pendingCount} bets, ${gbp(pl.pendingStakeGBP)} staked</div></div>`));
  if (pl.openBets.length) {
    const ob=pl.openBets.map(b=>`<tr><td>${b.player}</td><td>${b.marketLabel}${b.eachWay?' (e/w)':''}</td><td class="num right">${b.priceFractional}</td><td class="right">${gbp(b.stakeGBP)}</td><td class="right" style="color:var(--gold)">pending</td></tr>`).join('');
    t4.appendChild($(`<div class="card-base" style="padding:6px 14px 10px;overflow-x:auto"><table><thead><tr><th>Player</th><th>Market</th><th class="right">Price</th><th class="right">Stake</th><th class="right">Status</th></tr></thead><tbody>${ob}</tbody></table></div>`));
  } else t4.appendChild($(`<div class="card-base emptybox">No open bets.</div>`));

  t4.appendChild($(`<div class="shead accent-blue"><h2>Settled History</h2><div class="ln"></div><div class="tag">verifiable record</div></div>`));
  if (pl.history.length) {
    const hh=pl.history.map(b=>`<tr><td>${b.player}</td><td>${b.eventName}</td><td>${b.marketLabel}</td><td class="right">${b.priceFractional}</td><td class="right">${b.finishPos||''}</td><td class="right ${b.profitGBP>0?'stat-up':'stat-dn'}">${signed(b.profitGBP)}</td></tr>`).join('');
    t4.appendChild($(`<div class="card-base" style="padding:6px 14px 10px;overflow-x:auto"><table><thead><tr><th>Player</th><th>Event</th><th>Market</th><th class="right">Price</th><th class="right">Finish</th><th class="right">P/L</th></tr></thead><tbody>${hh}</tbody></table></div>`));
  } else t4.appendChild($(`<div class="card-base emptybox">Track record starts this week. The Travelers bets settle next Monday once the leaderboard is final - every result logged here, win or lose.</div>`));
  app.appendChild(t4);

  // ----- TAB: RANKINGS -----
  const t5=$(`<div class="panel-tab" id="tab-rankings"></div>`);
  t5.appendChild($(`<div class="shead accent-blue"><h2>Official World Golf Ranking</h2><div class="ln"></div><div class="tag">this week's field &middot; reference</div></div>`));
  const wr=B.worldRankings.map(w=>`<tr><td class="rk">${w.owgr}</td><td><div class="tname"><img class="tshot" src="${w.headshot}" loading="lazy" onerror="this.style.visibility='hidden'"><span>${w.name}${w.value?'<span class="wbadge">value bet</span>':''}</span></div></td><td>${w.country||''}</td><td class="num right">${w.winOdds}</td></tr>`).join('');
  t5.appendChild($(`<div class="card-base" style="padding:6px 14px 10px;overflow-x:auto"><table><thead><tr><th>OWGR</th><th>Player</th><th>Country</th><th class="right">Win odds</th></tr></thead><tbody>${wr}</tbody></table></div>`));
  app.appendChild(t5);

  app.appendChild($(`<ul class="notes">${B.notes.map(n=>`<li>${n}</li>`).join('')}<li>Recent form uses the last 5 events: ${B.recentEventsUsed.join(', ')}.</li></ul>`));
  app.appendChild($(`<footer><span>Data: pgatour.com strokes-gained &middot; model estimates, not financial advice.</span><span class="rg">18+ &middot; Bet responsibly &middot; begambleaware.org</span></footer>`));

  document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel-tab').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active'); document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
    window.scrollTo({top:0,behavior:'smooth'});
  }));
}
render();
</script>
</body>
</html>
