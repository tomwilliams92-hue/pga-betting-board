<script>
const B = window.BOARD;
const $ = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild;};
const initials = (nm)=>nm.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const sgFmt = (v)=>(v==null||isNaN(v))?'–':(v>=0?'+':'')+v.toFixed(2);
const sgCls = (v)=>v>=0?'pos':'neg';
const stars = (n)=>Array.from({length:5},(_,i)=>i<n?'★':'<span class="off">★</span>').join('');
const arrow = (t)=>t==='up'?'▲ trending up':t==='down'?'▼ cooling off':'▬ steady';
const pct = (p)=>(p*100).toFixed(p<0.1?1:0)+'%';
const edgeStr = (e)=>(e>=0?'+':'−')+Math.abs(e)+'%';
const pts = (n)=>`${n} pt${Math.abs(n)===1?'':'s'}`;
const signedPts = (n)=>`${n>=0?'+':''}${n} pts`;
const PPP = (window.BOARD && window.BOARD.bankroll && window.BOARD.bankroll.poundsPerPoint) || 0; // £ per point (in-house plan)
const gbp = (n)=> PPP ? `£${Math.round(n*PPP*100)/100}` : '';
const ptsGbp = (n)=> PPP ? `${pts(n)} (${gbp(n)})` : pts(n);
const signedGbp = (n)=> PPP ? `${n>=0?'+':'−'}${gbp(Math.abs(n))}` : '';
const shot=(p,cls,size)=>`<img class="${cls}" src="${p.headshot}" alt="${p.name}" loading="lazy" onerror="this.outerHTML='<div class=\\'${cls} fallback\\' style=\\'font-size:${size}px\\'>${initials(p.name)}</div>'">`;

// Branded "Back it" button — uses the actual best-price bookmaker per pick (from live odds)
// when available, else a sensible default. Add your affiliate links to BOOKIE_URLS.
const BOOKIE_URLS = {
  'bet365':'https://www.bet365.com/#/AS/B14/', 'william hill':'https://sports.williamhill.com/betting/en-gb/golf',
  'paddy power':'https://www.paddypower.com/golf', 'sky bet':'https://m.skybet.com/golf',
  'betfair':'https://www.betfair.com/sport/golf', 'ladbrokes':'https://sports.ladbrokes.com/sport/golf',
  'coral':'https://sports.coral.co.uk/sport/golf', 'unibet':'https://www.unibet.co.uk/betting/sports/filter/golf',
  'betvictor':'https://www.betvictor.com/sports/en/golf',
};
// With live odds: branded button to the best-price bookmaker. Without: "Compare prices"
// opens the oddschecker market for that bet (all UK books: Will Hill, BetVictor, Ladbrokes,
// Sky Bet, Paddy Power, ...) so you can shop the best price yourself.
function backButton(c) {
  if (c && c.bookie) {
    const b = c.bookie, url = BOOKIE_URLS[(b.name || '').toLowerCase()] || BOOKIE_URLS['bet365'];
    return `<a class="backbtn" style="background:${b.bg};color:${b.fg}" href="${url}" target="_blank" rel="noopener">Back ${b.name} →</a>`;
  }
  const oc = (c && c.ocLink) || 'https://www.oddschecker.com/golf';
  return `<a class="backbtn" style="background:var(--blue);color:#04142f" href="${oc}" target="_blank" rel="noopener">Compare prices →</a>`;
}

const FLAGS={USA:'us',ENG:'gb-eng',SCO:'gb-sct',WAL:'gb-wls',NIR:'gb-nir',IRL:'ie',RSA:'za',AUS:'au',ESP:'es',SWE:'se',KOR:'kr',JPN:'jp',CAN:'ca',NOR:'no',GER:'de',FRA:'fr',ITA:'it',ARG:'ar',COL:'co',MEX:'mx',NZL:'nz',AUT:'at',BEL:'be',DEN:'dk',FIN:'fi',IND:'in',PHI:'ph',TPE:'tw',VEN:'ve',ZWE:'zw',CHI:'cl',CHL:'cl',NED:'nl',CZE:'cz',POL:'pl',COP:'co'};
const flag=(code)=>{const c=FLAGS[(code||'').toUpperCase()];return c?`<img class="natflag" src="https://flagcdn.com/24x18/${c}.png" alt="${code}">`:'';};

function valueCard(c) {
  const flut = !c.tracked;
  // each-way reads as "1pt each-way (£5) · 2pt / £10 total"; place bets as "3pt (£15)"
  const stakeLabel = c.eachWay
    ? `${ptsGbp(c.points/2)} each-way${c.eachWayPlaces?` (${c.eachWayPlaces} places)`:''} &middot; ${ptsGbp(c.points)} total`
    : ptsGbp(c.points);
  const unitNote = PPP ? `tracked in the P&L &middot; in-house plan at ${gbp(1)}/point` : 'tracked in the P&L (points only - set your own unit)';
  const stakeBox = flut
    ? `<div class="stake flut"><div class="big">Flutter &middot; ${stakeLabel}</div><div class="ew">Just for fun - not tracked in the P&L</div></div>`
    : `<div class="stake"><div class="big">Suggested stake: ${stakeLabel}</div><div class="ew">${unitNote}</div></div>`;
  const chips = [];
  if (c.lastWeekFinish) chips.push(`<span class="mini">Last wk: ${c.lastWeekFinish}</span>`);
  else if (c.playedLastWeek===false) chips.push(`<span class="mini">Didn't play last wk</span>`);
  if (c.playerNoteTag) chips.push(`<span class="mini warn">⚠ ${c.playerNoteTag}</span>`);
  return $(`
  <div class="card-base pick ${flut?'flutter':''}">
    <div class="ph">
      <span class="badge">${c.marketLabel}</span>
      ${shot(c,'shot',20)}
      <div class="who"><div class="nm">${flag(c.country)} ${c.name}</div>
        <div class="row2"><span class="owgr">OWGR #${c.owgr}</span></div>
      </div>
    </div>
    <div class="odds-row">
      <div class="price">${c.marquee==='Each-way to win'?'<span class="ewtag">★ Each-way to win</span><br>':''}${c.marketOdds.fractional}<small>Best Price &middot; <b>${c.marquee==='Each-way to win'?`${c.ewPlaceProb}% to make top 8`:`${edgeStr(c.edgePct)} edge`}</b></small></div>
      ${backButton(c)}
    </div>
    <div class="mvm">
      <div class="r"><span class="lab">Model</span><div class="track"><i style="width:${Math.min(100,c.modelProb*100)}%"></i></div><span class="v">${pct(c.modelProb)}</span></div>
      <div class="r mk"><span class="lab">Market</span><div class="track"><i style="width:${Math.min(100,c.marketProb*100)}%"></i></div><span class="v">${pct(c.marketProb)}</span></div>
    </div>
    ${chips.length?`<div class="chiprow">${chips.join('')}</div>`:''}
    ${stakeBox}
    <div class="sg">
      <div class="cell"><div class="k">Off Tee</div><div class="v ${sgCls(c.sg.ott)}">${sgFmt(c.sg.ott)}</div></div>
      <div class="cell"><div class="k">Appr</div><div class="v ${sgCls(c.sg.app)}">${sgFmt(c.sg.app)}</div></div>
      <div class="cell"><div class="k">Short</div><div class="v ${sgCls(c.sg.arg)}">${sgFmt(c.sg.arg)}</div></div>
      <div class="cell"><div class="k">Putt</div><div class="v ${sgCls(c.sg.putt)}">${sgFmt(c.sg.putt)}</div></div>
    </div>
    <div class="why2">${c.rationale}</div>
  </div>`);
}
const selCol=(title,list)=>`<div class="card-base selcol"><h3>${title}</h3>${list.map(c=>`<div class="selrow">${shot(c,'tshot',11)}<span class="nm">${flag(c.country)} ${c.name}</span><span class="od">${c.modelOdds.fractional}</span><span class="ed">${edgeStr(c.edgePct)}</span></div>`).join('')}</div>`;

function render() {
  document.getElementById('updated').innerHTML = `Updated<br><b>${new Date(B.generatedAt).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</b>`;
  const app = document.getElementById('app');
  const cp = B.courseProfile, wlabels={ott:'Off the tee',app:'Approach play',arg:'Short game',putt:'Putting'};

  app.appendChild($(`<div class="event"><div class="ev-top">
    ${B.event.logo?`<img class="logo" src="${B.event.logo}" alt="${B.event.name} logo" onerror="this.style.display='none'">`:''}
    <div class="etext"><div class="ttl">${B.event.name}</div><div class="meta"><b>${B.event.course||''}</b>${B.event.city?' &middot; '+B.event.city+', '+(B.event.state||''):''}</div></div>
    </div><div class="pills">${B.event.dateRange?`<span class="pill"><b>${B.event.dateRange}</b></span>`:''}<span class="pill">Field <b>${B.event.fieldSize}</b></span>${cp.par?`<span class="pill">Par <b>${cp.par}</b></span>`:''}${cp.yards?`<span class="pill"><b>${cp.yards.toLocaleString()}</b> yds</span>`:''}</div></div>`));
  if (B.previousEvent && B.previousEvent.isMajor)
    app.appendChild($(`<div class="alert"><span>⚠</span><div><b>Post-major week.</b> Last week was the ${B.previousEvent.name}. We modestly fade only the winner (${B.previousEvent.champion}) - backing up a win the next week is rare. Players who merely contended are <b>not</b> penalised; the broader "major hangover" isn't supported by the data.</div></div>`));

  app.appendChild($(`<details class="key"><summary>How to read this board (key)</summary><div class="body">
    <p><b>Value Edge</b> - how much higher our model rates a player's chance than the <b>Best Price</b> implies. +25% edge means the model thinks he's 25% more likely than the price suggests. Positive edge = potential value. It's the whole game: we back prices that are too big, not just good players.</p>
    <p><b>Best Price</b> - the most generous odds across the major UK bookmakers (Bet365, William Hill, BetVictor, Ladbrokes, Sky Bet, Paddy Power and more). When a live odds feed is connected, each pick names the book with the best price and the button backs it directly; otherwise the price is a model estimate and the "Compare prices" button opens the oddschecker market so you can shop all the books yourself.</p>
    <p><b>Model vs Market</b> - the two bars: our model's probability (blue) vs the price-implied probability (gold). The gap is the edge.</p>
    <p><b>Each-way (e/w)</b> - half the stake on the win, half on a place at 1/5 of the odds. We use Bet365's 8 places on a full field, so you collect if he finishes in the top 8 even without winning. The backtest sweet spot is 20/1-50/1: below ~16/1 the place return is too thin, above ~50/1 it's a lottery. <b>Points & stakes</b> - the P&L runs in points/units. The suggested stakes shown are our in-house plan at £5 per point (e.g. 3pt = £15; a 1pt each-way bet is £5 win + £5 place = £10). Scale it to your own unit.</p>
  </div></details>`));

  app.appendChild($(`<div class="tabs">
    <button class="tab active" data-tab="card">The Card</button>
    <button class="tab" data-tab="places">Each-Way &amp; Places</button>
    <button class="tab" data-tab="watch">Watchlist</button>
    <button class="tab" data-tab="pnl">P&amp;L &amp; Record</button>
    <button class="tab" data-tab="rankings">World Rankings</button>
  </div>`));

  // ---- THE CARD ----
  const t1 = $(`<div class="panel-tab active" id="tab-card"></div>`);
  const bb = B.bestBet;
  if (bb) t1.appendChild($(`<div class="card-base bestbet"><div class="bb-tag">★ Best Bet of the Week &middot; ${bb.marketLabel}</div>
    <div class="bb-main">${shot(bb,'shot',24)}<div class="bb-info"><div class="nm">${flag(bb.country)} ${bb.name}</div><div class="why">${bb.rationale}</div></div>
    <div class="bb-odds"><div class="o">${bb.marketOdds.fractional}</div><div class="l">Best Price</div><div class="edgechip">${edgeStr(bb.edgePct)} edge</div>
      ${backButton(bb)}</div></div></div>`));

  t1.appendChild($(`<div class="shead accent-blue"><h2>Tracked Bets</h2><div class="ln"></div><div class="tag">value-ranked &middot; feed the P&L</div></div>`));
  const g1=$(`<div class="grid3"></div>`); B.trackedBets.forEach(c=>g1.appendChild(valueCard(c))); t1.appendChild(g1);

  if (B.flutters && B.flutters.length) {
    t1.appendChild($(`<div class="shead accent-gold"><h2>Untracked Flutters</h2><div class="ln"></div><div class="tag">if you fancy it &middot; not in the P&L</div></div>`));
    const g2=$(`<div class="grid2"></div>`); B.flutters.forEach(c=>g2.appendChild(valueCard(c))); t1.appendChild(g2);
  }

  t1.appendChild($(`<div class="shead accent-blue"><h2>The Course</h2><div class="ln"></div><div class="tag">course-fit drives the value</div></div>`));
  const maxW=Math.max(...Object.values(cp.weights));
  const bars=['app','ott','arg','putt'].sort((a,b)=>cp.weights[b]-cp.weights[a]).map(k=>`<div class="wbar"><div class="lab"><span>${wlabels[k]}</span><span>${Math.round(cp.weights[k]*100)}%</span></div><div class="track"><i style="width:${(cp.weights[k]/maxW*100).toFixed(0)}%"></i></div></div>`).join('');
  t1.appendChild($(`<div class="course"><div class="card-base info"><div class="arche">${cp.archetype}</div><div class="summary">${cp.narrative||cp.summary}</div><div class="chips">${cp.tags.map(t=>`<span class="chip">${t}</span>`).join('')}</div></div><div class="card-base weights"><div class="wt-h">Skill weighting the model uses</div>${bars}</div></div>`));

  t1.appendChild($(`<div class="shead accent-blue"><h2>Field Watch</h2><div class="ln"></div><div class="tag">model top 15 by win chance</div></div>`));
  const fr=B.fieldRanking.map(p=>`<tr><td class="rk" data-label="">${p.modelRank}</td><td data-label="Player"><div class="tname">${shot(p,'tshot',11)}<span>${p.name}</span></div></td><td class="num right" data-label="Win odds">${p.win.fractional}</td><td class="num right" data-label="Win %">${pct(p.winProb)}</td><td class="right ${p.trend==='up'?'pos':p.trend==='down'?'neg':''}" data-label="Recent SG">${p.trend==='up'?'▲':p.trend==='down'?'▼':'▬'} ${p.recentEvents?p.recentSG.toFixed(2):'–'}</td></tr>`).join('');
  t1.appendChild($(`<div class="card-base tablewrap fw-wrap mob-cards" style="padding:6px 12px 10px"><table><thead><tr><th class="rk"></th><th>Player</th><th class="right">Win odds</th><th class="right">Win%</th><th class="right">Recent SG</th></tr></thead><tbody>${fr}</tbody></table></div>`));
  app.appendChild(t1);

  // ---- PLACES ----
  const t2=$(`<div class="panel-tab" id="tab-places"></div>`);
  t2.appendChild($(`<div class="shead accent-gold"><h2>Best Each-Way Value</h2><div class="ln"></div><div class="tag">strong top-5 chance at a price</div></div>`));
  const g4=$(`<div class="grid4"></div>`);
  (B.eachWayValue||[]).forEach(c=>g4.appendChild($(`<div class="card-base ewcard">${shot(c,'bshot',16)}<div class="nm">${flag(c.country)} ${c.name}</div><div class="o">${c.marketOdds.fractional}<small>To win &middot; e/w 8 places</small></div><div class="ed">${c.ewPlaceProb}% to make top 8</div></div>`)));
  t2.appendChild(g4);
  t2.appendChild($(`<div class="shead accent-blue"><h2>Place Selections</h2><div class="ln"></div><div class="tag">ranked by value</div></div>`));
  t2.appendChild($(`<div class="sel3">${selCol('To Finish Top 5',B.top5Sel)}${selCol('To Finish Top 10',B.top10Sel)}${selCol('To Finish Top 20',B.top20Sel)}</div>`));
  t2.appendChild($(`<div class="shead accent-blue"><h2>Full Market Board</h2><div class="ln"></div><div class="tag">model fair odds</div></div>`));
  const prt=B.placesTable.map(p=>`<tr><td class="rk">${p.modelRank}</td><td><div class="tname">${shot(p,'tshot',11)}<span>${p.name}${p.letdownFlag?' <span style="color:var(--gold)">⚠</span>':''}</span></div></td><td class="num right">${p.win.fractional}</td><td class="num right">${p.top5.fractional}</td><td class="num right">${p.top10.fractional}</td><td class="num right">${p.top20.fractional}</td></tr>`).join('');
  t2.appendChild($(`<div class="card-base tablewrap" style="padding:6px 12px 10px"><table><thead><tr><th></th><th>Player</th><th class="right">Win</th><th class="right">Top 5</th><th class="right">Top 10</th><th class="right">Top 20</th></tr></thead><tbody>${prt}</tbody></table></div>`));
  app.appendChild(t2);

  // ---- WATCHLIST ----
  const t3=$(`<div class="panel-tab" id="tab-watch"></div>`);
  t3.appendChild($(`<div class="shead accent-blue"><h2>Watchlist</h2><div class="ln"></div><div class="tag">not backable this week &middot; ones to watch</div></div>`));
  const wlGrid=$(`<div class="wl-grid"></div>`);
  (B.watchlist||[]).forEach(w=>{
    const tc=w.trend==='up'?'pos':w.trend==='down'?'neg':'';
    const ta=w.trend==='up'?'▲':w.trend==='down'?'▼':'▬';
    const sgStr=w.recentEvents?w.recentSG.toFixed(2):'–';
    wlGrid.appendChild($(`<div class="card-base wl-card"><div class="wl-top">${shot(w,'tshot',11)}<div class="wl-nm"><div class="pname">${flag(w.country)} ${w.name}${w.tag?` <span class="tagchip">${w.tag}</span>`:''}</div><div class="wmeta"><span>OWGR #${w.owgr}</span><span class="${tc}">${ta} ${sgStr}</span><span class="wod">${w.winOdds}</span></div></div></div><div class="wl-why">${w.why}</div></div>`));
  });
  t3.appendChild(wlGrid);
  app.appendChild(t3);

  // ---- P&L ----
  const t4=$(`<div class="panel-tab" id="tab-pnl"></div>`);
  const pl=B.pnl, pcls=pl.profitPts>0?'stat-up':pl.profitPts<0?'stat-dn':'';
  t4.appendChild($(`<div class="shead accent-blue"><h2>P&amp;L Dashboard</h2><div class="ln"></div><div class="tag">${PPP?`in-house plan &middot; ${gbp(1)} per point`:'points / units &middot; set your own stake'}</div></div>`));
  t4.appendChild($(`<div class="pnlgrid">
    <div class="card-base b"><div class="k">Bank</div><div class="v">${pl.bankNowPts} pts</div><small>${PPP?`${gbp(pl.bankNowPts)} &middot; `:''}from ${pl.startBankPts} pt start</small></div>
    <div class="card-base b"><div class="k">Net P/L</div><div class="v ${pcls}">${signedPts(pl.profitPts)}</div><small>${PPP?`${signedGbp(pl.profitPts)} &middot; `:''}${pl.settledCount} settled &middot; ${pl.pendingCount} open</small></div>
    <div class="card-base b"><div class="k">ROI</div><div class="v ${pcls}">${pl.roiPct>=0?'+':''}${pl.roiPct}%</div><small>${pl.stakedPts} pts${PPP?` (${gbp(pl.stakedPts)})`:''} staked</small></div>
    <div class="card-base b"><div class="k">Strike rate</div><div class="v">${pl.strikeRatePct}%</div><small>${pl.won}W &middot; ${pl.lost}L &middot; ${pl.totalBets} bets</small></div>
  </div>`));

  // Staked vs Returned chart
  {
    const stld=(pl.allBets||[]).filter(b=>b.status!=='pending');
    t4.appendChild($(`<div class="shead accent-blue"><h2>Staked vs Returned</h2><div class="ln"></div><div class="tag">cumulative points &middot; builds week by week</div></div>`));
    const CW=800,CH=190,pd2={t:20,r:120,b:30,l:48};
    const legend=`<div style="display:flex;gap:18px;padding:8px 4px 0;font-size:11.5px;color:var(--muted)"><span><svg width="20" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="#2b8cff" stroke-width="2" stroke-dasharray="5,3"/></svg> Staked</span><span><svg width="20" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="#36d399" stroke-width="2.5"/></svg> Returned</span></div>`;
    if (stld.length===0) {
      const gx1=pd2.l,gx2=CW-pd2.r,gy1=pd2.t,gy2=CH-pd2.b;
      t4.appendChild($(`<div class="card-base pnl-chart-wrap"><svg class="pnl-svg" viewBox="0 0 ${CW} ${CH}" xmlns="http://www.w3.org/2000/svg">
        <line x1="${gx1}" y1="${gy1}" x2="${gx1}" y2="${gy2}" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
        <line x1="${gx1}" y1="${gy2}" x2="${gx2}" y2="${gy2}" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
        <text x="${gx1}" y="${gy2+14}" fill="#8fa9d0" font-size="10" text-anchor="middle">0</text>
        <text x="${gx1-6}" y="${gy1+(gy2-gy1)/2}" fill="#8fa9d0" font-size="10" text-anchor="end" dominant-baseline="middle">0</text>
        <text x="${(gx1+gx2)/2}" y="${gy1+(gy2-gy1)/2}" fill="#8fa9d0" font-size="13" text-anchor="middle" dominant-baseline="middle">No settled bets yet — chart builds as bets are tracked</text>
      </svg>${legend}</div>`));
    } else {
      let cs=0,cr=0;
      const sp=[{s:0,r:0},...stld.map(b=>{cs+=b.stakePts;cr+=Math.max(0,b.stakePts+b.profitPts);return {s:cs,r:cr};})];
      const N=sp.length;
      const maxV=Math.max(...sp.map(p=>Math.max(p.s,p.r)),1);
      const cX2=i=>pd2.l+(i/(N-1))*(CW-pd2.l-pd2.r);
      const cY2=v=>pd2.t+(1-v/maxV)*(CH-pd2.t-pd2.b);
      const sLine=sp.map((p,i)=>`${cX2(i).toFixed(1)},${cY2(p.s).toFixed(1)}`).join(' ');
      const rLine=sp.map((p,i)=>`${cX2(i).toFixed(1)},${cY2(p.r).toFixed(1)}`).join(' ');
      const bot=cY2(0).toFixed(1);
      const sArea=`${cX2(0).toFixed(1)},${bot} ${sLine} ${cX2(N-1).toFixed(1)},${bot}`;
      const rArea=`${cX2(0).toFixed(1)},${bot} ${rLine} ${cX2(N-1).toFixed(1)},${bot}`;
      const ytv2=[0,Math.round(maxV/2),maxV];
      const ytk2=ytv2.map(v=>`<line x1="${pd2.l}" y1="${cY2(v).toFixed(1)}" x2="${CW-pd2.r}" y2="${cY2(v).toFixed(1)}" stroke="rgba(255,255,255,.07)" stroke-width="1"/><text x="${pd2.l-5}" y="${cY2(v).toFixed(1)}" fill="#8fa9d0" font-size="10" text-anchor="end" dominant-baseline="middle">${v.toFixed(0)}</text>`).join('');
      const fS=sp[N-1].s,fR=sp[N-1].r;
      const netCol=fR>=fS?'#36d399':'#ff6f6f';
      const eX=cX2(N-1).toFixed(1);
      t4.appendChild($(`<div class="card-base pnl-chart-wrap"><svg class="pnl-svg" viewBox="0 0 ${CW} ${CH}" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2b8cff" stop-opacity=".15"/><stop offset="100%" stop-color="#2b8cff" stop-opacity="0"/></linearGradient>
          <linearGradient id="rg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#36d399" stop-opacity=".25"/><stop offset="100%" stop-color="#36d399" stop-opacity="0"/></linearGradient>
        </defs>
        ${ytk2}
        <polyline points="${sArea}" fill="url(#sg1)" stroke="none"/>
        <polyline points="${sLine}" fill="none" stroke="#2b8cff" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="5,3"/>
        <polyline points="${rArea}" fill="url(#rg1)" stroke="none"/>
        <polyline points="${rLine}" fill="none" stroke="#36d399" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${eX}" cy="${cY2(fS).toFixed(1)}" r="3.5" fill="#2b8cff"/>
        <text x="${parseFloat(eX)+8}" y="${cY2(fS).toFixed(1)}" fill="#2b8cff" font-size="11" dominant-baseline="middle">${fS.toFixed(1)} pts staked</text>
        <circle cx="${eX}" cy="${cY2(fR).toFixed(1)}" r="4" fill="${netCol}"/>
        <text x="${parseFloat(eX)+8}" y="${cY2(fR).toFixed(1)}" fill="${netCol}" font-size="11" dominant-baseline="middle" font-weight="bold">${fR.toFixed(1)} pts returned</text>
      </svg>${legend}</div>`));
    }
  }

  if (pl.byMarket && pl.byMarket.length) {
    const bm=pl.byMarket.map(m=>`<tr><td>${m.market}</td><td class="right">${m.bets}</td><td class="right">${m.staked} pts</td><td class="right ${m.profit>=0?'stat-up':'stat-dn'}">${signedPts(m.profit)}</td><td class="right">${m.roiPct>=0?'+':''}${m.roiPct}%</td></tr>`).join('');
    t4.appendChild($(`<div class="shead accent-blue"><h2>By Market</h2><div class="ln"></div></div><div class="card-base tablewrap" style="padding:6px 12px 10px"><table><thead><tr><th>Market</th><th class="right">Bets</th><th class="right">Staked</th><th class="right">P/L</th><th class="right">ROI</th></tr></thead><tbody>${bm}</tbody></table></div>`));
  }

  t4.appendChild($(`<div class="shead accent-blue"><h2>Every Bet</h2><div class="ln"></div><div class="tag">full record &middot; ${pl.totalBets} all-time</div></div>`));
  if (pl.allBets.length) {
    const rows=pl.allBets.map(b=>{
      const stat = b.status==='pending'?'<span style="color:var(--gold)">pending</span>':(b.profitPts>0?'<span class="stat-up">won</span>':'<span class="stat-dn">lost</span>');
      const pnl = b.status==='pending'?'–':`<span class="${b.profitPts>0?'stat-up':'stat-dn'}">${signedPts(b.profitPts)}</span>`;
      return `<tr><td data-label="Event">${b.eventName}</td><td data-label="Player">${b.player}</td><td data-label="Market">${b.marketLabel}${b.eachWay?' e/w':''}</td><td class="right" data-label="Price">${b.priceFractional}</td><td class="right" data-label="Stake">${pts(b.stakePts)}</td><td class="right" data-label="Finish">${b.finishPos||'–'}</td><td class="right" data-label="Status">${stat}</td><td class="right" data-label="P/L">${pnl}</td></tr>`;
    }).join('');
    t4.appendChild($(`<div class="card-base tablewrap mob-cards" style="padding:6px 12px 10px"><table><thead><tr><th>Event</th><th>Player</th><th>Market</th><th class="right">Price</th><th class="right">Stake</th><th class="right">Finish</th><th class="right">Status</th><th class="right">P/L</th></tr></thead><tbody>${rows}</tbody></table></div>`));
  } else t4.appendChild($(`<div class="card-base emptybox">Track record starts this week. Every bet, win or lose, is logged here and settled next Monday off the final leaderboard.</div>`));
  app.appendChild(t4);

  // ---- RANKINGS ----
  const t5=$(`<div class="panel-tab" id="tab-rankings"></div>`);
  t5.appendChild($(`<div class="shead accent-blue"><h2>Official World Golf Ranking</h2><div class="ln"></div><div class="tag">this week's field</div></div>`));
  const wr=B.worldRankings.map(w=>`<tr><td class="rk" data-label="Rank">${w.owgr}</td><td data-label="Player"><div class="tname"><img class="tshot" src="${w.headshot}" loading="lazy" onerror="this.style.visibility='hidden'"><span>${flag(w.country)} ${w.name}${w.value?'<span class="wbadge">value bet</span>':''}</span></div></td><td class="num right" data-label="Win odds">${w.winOdds}</td></tr>`).join('');
  t5.appendChild($(`<div class="card-base tablewrap mob-cards" style="padding:6px 12px 10px"><table><thead><tr><th>OWGR</th><th>Player</th><th class="right">Win odds</th></tr></thead><tbody>${wr}</tbody></table></div>`));
  app.appendChild(t5);

  app.appendChild($(`<ul class="notes">${B.notes.map(n=>`<li>${n}</li>`).join('')}<li>Recent form uses the last 5 events: ${B.recentEventsUsed.join(', ')}.</li></ul>`));
  app.appendChild($(`<footer><div class="rgfoot"><span class="age">18+</span> When the fun stops, stop. &middot; <a href="https://www.begambleaware.org" target="_blank" rel="noopener">BeGambleAware.org</a> &middot; Please gamble responsibly</div><div class="src">Data: pgatour.com &middot; model estimates, not financial advice.</div></footer>`));

  document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel-tab').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active'); document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
    window.scrollTo({top:0,behavior:'smooth'});
  }));
}
render();
</script>
</body>
</html>
